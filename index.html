<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a0420" />
<title>NEOSSH CALENDAR</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  :root {
    --cyan: #2ff3ff;
    --magenta: #ff3df0;
    --violet: #a96bff;
    --gold: #ffc24b;
    --text: #eaf6ff;
    --dim: #9fb4d6;
    --glass: rgba(14, 10, 38, 0.55);
    --glass-line: rgba(120, 200, 255, 0.28);
    --glow-cyan: 0 0 8px #2ff3ff, 0 0 22px rgba(47, 243, 255, .55);
    --glow-mag: 0 0 8px #ff3df0, 0 0 22px rgba(255, 61, 240, .55);
    --font: "Orbitron", system-ui, sans-serif;
    --mono: "Share Tech Mono", "Courier New", monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }
  body {
    font-family: var(--font);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    background: #0a0420;
    display: grid;
    place-items: center;
    padding: 28px 16px;
  }

  /* Background image + readability overlay */
  .bg {
    position: fixed; inset: 0; z-index: -3;
    background: url("Background.png") center / cover no-repeat;
    transform: scale(1.04);
    animation: bgFloat 28s ease-in-out infinite alternate;
  }
  @keyframes bgFloat { to { transform: scale(1.12) translateY(-12px); } }
  .bg::after {
    content: ""; position: absolute; inset: 0;
    /* Light touch: keep the city detail vivid, just tame the brightest center
       and add a soft bottom scrim so panel text stays readable. */
    background:
      radial-gradient(ellipse at 50% 42%, rgba(8,3,24,.04), rgba(8,3,24,.40) 82%),
      linear-gradient(180deg, rgba(8,3,24,.12), rgba(8,3,24,.30));
  }

  /* Fireworks canvas */
  #fx { position: fixed; inset: 0; z-index: -2; pointer-events: none; }

  /* ---------- Main panel ---------- */
  .panel {
    width: min(940px, 96vw);
    background: linear-gradient(160deg, rgba(20,14,52,.40), rgba(10,6,26,.30));
    backdrop-filter: blur(10px) saturate(1.5);
    -webkit-backdrop-filter: blur(10px) saturate(1.5);
    border: 1px solid var(--glass-line);
    border-radius: 22px;
    box-shadow:
      0 0 0 1px rgba(255, 61, 240, .12) inset,
      0 30px 80px rgba(0, 0, 0, .55),
      0 0 60px rgba(47, 243, 255, .14);
    padding: 30px;
    position: relative;
    overflow: hidden;
  }
  .panel::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(transparent 0 3px, rgba(0,0,0,.05) 3px 6px);
    mix-blend-mode: overlay;
  }

  .brand {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; flex-wrap: wrap; gap: 10px;
  }
  .brand .name {
    font-size: 26px; font-weight: 900; letter-spacing: 5px;
    color: var(--cyan); text-shadow: var(--glow-cyan);
  }
  .brand .name b { color: var(--magenta); text-shadow: var(--glow-mag); }
  .brand .status {
    font-family: var(--mono); font-size: 12px; letter-spacing: 2px;
    color: var(--gold); text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .brand .status .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--gold);
    box-shadow: 0 0 10px var(--gold); animation: pulse 1.4s infinite;
  }
  @keyframes pulse { 50% { opacity: .3; } }

  .layout { display: grid; grid-template-columns: 300px 1fr; gap: 30px; align-items: start; }

  /* ---------- Analog clock ---------- */
  .clock-card { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .clock { position: relative; width: 260px; height: 260px; }
  .clock svg { width: 100%; height: 100%; overflow: visible; }
  .face-ring { fill: none; stroke: rgba(120,200,255,.18); stroke-width: 2; }
  .face-glow { fill: rgba(10,6,30,.35); }
  .tick { stroke: var(--cyan); stroke-width: 2; opacity: .55; }
  .tick.major { stroke: var(--magenta); stroke-width: 3; opacity: .9; filter: drop-shadow(0 0 4px var(--magenta)); }
  .hand { stroke-linecap: round; transform-origin: 130px 130px; transition: filter .2s; }
  .hand.hour { stroke: var(--text); stroke-width: 6; filter: drop-shadow(0 0 4px rgba(234,246,255,.6)); }
  .hand.minute { stroke: var(--cyan); stroke-width: 4; filter: drop-shadow(0 0 6px var(--cyan)); }
  .hand.second { stroke: var(--magenta); stroke-width: 2; filter: drop-shadow(0 0 6px var(--magenta)); }
  .cap { fill: var(--gold); filter: drop-shadow(0 0 6px var(--gold)); }
  .num { fill: var(--dim); font-family: var(--mono); font-size: 13px; text-anchor: middle; dominant-baseline: middle; }

  .digital { text-align: center; }
  .digital .time {
    font-size: 40px; font-weight: 800; letter-spacing: 3px;
    color: var(--text); text-shadow: 0 0 12px rgba(47,243,255,.5);
    font-variant-numeric: tabular-nums;
  }
  .digital .time .ampm { font-size: 16px; color: var(--magenta); margin-left: 6px; }
  .digital .date { font-family: var(--mono); color: var(--gold); letter-spacing: 2px; margin-top: 6px; font-size: 14px; }

  /* ---------- Calendar ---------- */
  .cal-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .cal-title-wrap { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .cal-title { font-size: 22px; font-weight: 800; letter-spacing: 2px; }
  .cal-title span { color: var(--magenta); text-shadow: var(--glow-mag); }
  .nav-btns { display: flex; gap: 10px; }
  .nav-btns button {
    font-family: var(--font); font-weight: 700; font-size: 18px;
    width: 42px; height: 42px; border-radius: 10px; cursor: pointer;
    color: var(--cyan); background: rgba(47,243,255,.06);
    border: 1px solid var(--glass-line); transition: all .18s;
    display: grid; place-items: center; line-height: 1;
  }
  .nav-btns button:hover { background: var(--cyan); color: #06121a; box-shadow: var(--glow-cyan); }
  .today-btn {
    font-family: var(--font); font-weight: 700; font-size: 12px; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer; padding: 9px 16px; border-radius: 20px;
    color: var(--gold); background: rgba(255,194,75,.08);
    border: 1px solid rgba(255,194,75,.45); transition: all .18s; white-space: nowrap;
  }
  .today-btn:hover { background: var(--gold); color: #1a1206; box-shadow: 0 0 8px var(--gold), 0 0 20px rgba(255,194,75,.5); }

  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 8px; }
  .weekdays div { text-align: center; font-family: var(--mono); font-size: 12px; letter-spacing: 1px; color: var(--dim); padding: 6px 0; }
  .days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .day {
    aspect-ratio: 1 / 1; display: grid; place-items: center; position: relative;
    border-radius: 10px; font-size: 15px; font-weight: 600;
    border: 1px solid transparent; transition: all .15s; cursor: default;
  }
  .day.in { background: rgba(120,200,255,.05); border-color: rgba(120,200,255,.1); color: var(--text); }
  .day.in:hover { border-color: var(--cyan); box-shadow: var(--glow-cyan); transform: translateY(-2px); }
  .day.out { color: rgba(159,180,214,.25); }
  .day.today {
    color: #fff; font-weight: 900;
    background:
      radial-gradient(circle at 50% 38%, rgba(47,243,255,.30), rgba(255,61,240,.16) 70%, transparent),
      rgba(10,6,30,.55);
    border: 1.5px solid var(--cyan);
    box-shadow: 0 0 16px rgba(47,243,255,.5), inset 0 0 14px rgba(255,61,240,.28);
    text-shadow: 0 0 10px rgba(47,243,255,.95), 0 0 4px rgba(255,255,255,.7);
    animation: todayPulse 2.6s ease-in-out infinite;
  }
  @keyframes todayPulse {
    50% { box-shadow: 0 0 28px rgba(255,61,240,.8), inset 0 0 18px rgba(47,243,255,.4); border-color: var(--magenta); }
  }
  .day.selected:not(.today) { border-color: var(--magenta); box-shadow: var(--glow-mag); }

  /* saved-event indicator dot */
  .day .evt-dot {
    position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
    width: 5px; height: 5px; border-radius: 50%; background: var(--gold);
    box-shadow: 0 0 7px var(--gold);
  }
  .day.today .evt-dot { background: #fff; box-shadow: 0 0 7px #fff; }

  /* ---------- Event modal ---------- */
  .evt-modal {
    position: fixed; inset: 0; z-index: 50; display: none; place-items: center;
    background: rgba(5, 2, 16, 0.62); backdrop-filter: blur(5px); padding: 20px;
  }
  .evt-modal.open { display: grid; }
  .evt-box {
    width: min(390px, 92vw); background: rgba(14,10,38,.92);
    border: 1px solid var(--glass-line); border-radius: 16px; padding: 24px;
    box-shadow: 0 24px 60px rgba(0,0,0,.7), 0 0 44px rgba(47,243,255,.16);
    animation: boxIn .2s ease;
  }
  @keyframes boxIn { from { transform: translateY(16px) scale(.98); opacity: 0; } }
  .evt-box h3 { font-size: 16px; letter-spacing: 3px; color: var(--cyan); text-shadow: var(--glow-cyan); }
  .evt-box .evt-date { font-family: var(--mono); color: var(--gold); font-size: 14px; letter-spacing: 1px; margin: 6px 0 16px; }
  .evt-box textarea {
    width: 100%; min-height: 96px; resize: vertical; padding: 12px;
    background: rgba(10,6,30,.7); border: 1px solid var(--glass-line); border-radius: 10px;
    color: var(--text); font-family: var(--mono); font-size: 14px; outline: none; line-height: 1.5;
  }
  .evt-box textarea:focus { border-color: var(--cyan); box-shadow: var(--glow-cyan); }
  .evt-actions { display: flex; gap: 10px; margin-top: 16px; }
  .evt-actions button {
    flex: 1; padding: 12px; border-radius: 10px; cursor: pointer;
    font-family: var(--font); font-weight: 700; letter-spacing: 1px; font-size: 12px;
    border: 1px solid var(--glass-line); background: transparent; color: var(--text); transition: all .18s;
  }
  .btn-save { color: #06121a; background: linear-gradient(120deg, var(--cyan), var(--violet)); border: none; }
  .btn-save:hover { box-shadow: var(--glow-cyan); }
  .btn-del { color: var(--magenta); border-color: var(--magenta); }
  .btn-del:hover { background: var(--magenta); color: #fff; box-shadow: var(--glow-mag); }
  .btn-close:hover { color: #fff; border-color: var(--text); }

  .footer-note {
    margin-top: 22px; text-align: center; font-family: var(--mono);
    font-size: 12px; letter-spacing: 2px; color: var(--dim);
  }
  .footer-note b { color: var(--cyan); }

  /* ---------- Responsive ---------- */
  @media (max-width: 760px) {
    body { padding: 16px 10px; align-items: start; }
    .panel { padding: 20px; border-radius: 18px; }
    .layout { grid-template-columns: 1fr; gap: 26px; }
    .clock-card { order: -1; }
    .clock { width: 220px; height: 220px; }
    .brand .name { font-size: 21px; letter-spacing: 3px; }
    .digital .time { font-size: 34px; }
  }
  @media (max-width: 420px) {
    .clock { width: 190px; height: 190px; }
    .day { font-size: 13px; border-radius: 8px; }
    .days, .weekdays { gap: 4px; }
    .cal-title { font-size: 18px; }
    .cal-head { justify-content: center; }
    .cal-title-wrap { width: 100%; justify-content: space-between; }
    .nav-btns { width: 100%; justify-content: center; }
    .nav-btns button { flex: 1; max-width: 120px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .bg, .day.today, .brand .status .dot { animation: none; }
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <canvas id="fx"></canvas>

  <main class="panel">
    <div class="brand">
      <div class="name">NEOSSH<b>//</b>CALENDAR</div>
      <div class="status"><span class="dot"></span><span id="liveTz">SYNCED</span></div>
    </div>

    <div class="layout">
      <!-- Clock -->
      <section class="clock-card">
        <div class="clock">
          <svg viewBox="0 0 260 260">
            <circle class="face-glow" cx="130" cy="130" r="120" />
            <circle class="face-ring" cx="130" cy="130" r="120" />
            <circle class="face-ring" cx="130" cy="130" r="112" />
            <g id="ticks"></g>
            <g id="numerals"></g>
            <line class="hand hour"   id="hHour"   x1="130" y1="130" x2="130" y2="78" />
            <line class="hand minute" id="hMin"    x1="130" y1="130" x2="130" y2="56" />
            <line class="hand second" id="hSec"    x1="130" y1="142" x2="130" y2="44" />
            <circle class="cap" cx="130" cy="130" r="6" />
          </svg>
        </div>
        <div class="digital">
          <div class="time" id="digTime">--:--:--<span class="ampm" id="ampm"></span></div>
          <div class="date" id="digDate">—</div>
        </div>
      </section>

      <!-- Calendar -->
      <section class="cal">
        <div class="cal-head">
          <div class="cal-title-wrap">
            <div class="cal-title" id="calTitle">— <span></span></div>
            <button class="today-btn" id="todayBtn">⦿ Today</button>
          </div>
          <div class="nav-btns">
            <button id="prev" aria-label="Previous month">‹</button>
            <button id="next" aria-label="Next month">›</button>
          </div>
        </div>
        <div class="weekdays">
          <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
        </div>
        <div class="days" id="days"></div>
      </section>
    </div>

    <div class="footer-note">// NEOSSH CITY · 2077 — <b>STARDATE ONLINE</b></div>
  </main>

  <!-- Event editor -->
  <div class="evt-modal" id="evtModal">
    <div class="evt-box">
      <h3>// LOG ENTRY</h3>
      <div class="evt-date" id="evtDate">—</div>
      <textarea id="evtText" placeholder="Add a note, reminder or mission for this date..." maxlength="280"></textarea>
      <div class="evt-actions">
        <button class="btn-close" id="evtClose">Close</button>
        <button class="btn-del" id="evtDel">Delete</button>
        <button class="btn-save" id="evtSave">Save</button>
      </div>
    </div>
  </div>

<script>
/* ============================================================
   NEOSSH CALENDAR — clock, calendar, fireworks
   ============================================================ */
const MONTHS = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY",
                "AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];

/* ---- Timezone label --------------------------------------- */
(function setTz() {
  const el = document.getElementById("liveTz");
  try {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "LOCAL";
    const abbr = new Date().toLocaleTimeString("en-US", { timeZoneName: "short" }).split(" ").pop();
    el.textContent = `${tz.split("/").pop().replace(/_/g, " ")} · ${abbr}`;
  } catch (e) { el.textContent = "SYNCED"; }
})();

/* ---- Build clock ticks + numerals -------------------------- */
(function buildFace() {
  const ticks = document.getElementById("ticks");
  const nums = document.getElementById("numerals");
  const cx = 130, cy = 130;
  for (let i = 0; i < 60; i++) {
    const ang = (i / 60) * Math.PI * 2;
    const major = i % 5 === 0;
    const r1 = major ? 100 : 106;
    const r2 = 112;
    const x1 = cx + Math.sin(ang) * r1, y1 = cy - Math.cos(ang) * r1;
    const x2 = cx + Math.sin(ang) * r2, y2 = cy - Math.cos(ang) * r2;
    const ln = document.createElementNS("http://www.w3.org/2000/svg", "line");
    ln.setAttribute("x1", x1.toFixed(1)); ln.setAttribute("y1", y1.toFixed(1));
    ln.setAttribute("x2", x2.toFixed(1)); ln.setAttribute("y2", y2.toFixed(1));
    ln.setAttribute("class", "tick" + (major ? " major" : ""));
    ticks.appendChild(ln);
  }
  for (let h = 1; h <= 12; h++) {
    const ang = (h / 12) * Math.PI * 2;
    const r = 84;
    const x = cx + Math.sin(ang) * r, y = cy - Math.cos(ang) * r;
    const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
    t.setAttribute("x", x.toFixed(1)); t.setAttribute("y", y.toFixed(1));
    t.setAttribute("class", "num"); t.textContent = h;
    nums.appendChild(t);
  }
})();

/* ---- Tick the clock --------------------------------------- */
const hHour = document.getElementById("hHour");
const hMin = document.getElementById("hMin");
const hSec = document.getElementById("hSec");
const digTime = document.getElementById("digTime");
const ampmEl = document.getElementById("ampm");
const digDate = document.getElementById("digDate");

function updateClock() {
  const now = new Date();
  const ms = now.getMilliseconds();
  const s = now.getSeconds() + ms / 1000;
  const m = now.getMinutes() + s / 60;
  const h = (now.getHours() % 12) + m / 60;

  hSec.style.transform = `rotate(${s * 6}deg)`;
  hMin.style.transform = `rotate(${m * 6}deg)`;
  hHour.style.transform = `rotate(${h * 30}deg)`;

  let hr = now.getHours();
  const ap = hr >= 12 ? "PM" : "AM";
  hr = hr % 12 || 12;
  const pad = n => String(n).padStart(2, "0");
  digTime.firstChild.textContent = `${pad(hr)}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  ampmEl.textContent = ap;

  const days = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
  digDate.textContent = `${days[now.getDay()]} · ${pad(now.getDate())} ${MONTHS[now.getMonth()].slice(0,3)} ${now.getFullYear()}`;
}
setInterval(updateClock, 50);
updateClock();

/* ---- Calendar grid ---------------------------------------- */
let viewYear, viewMonth;
const daysEl = document.getElementById("days");
const calTitle = document.getElementById("calTitle");
let selectedKey = null;

/* saved events: { "YYYY-M-D": "note text" } in localStorage */
const EVT_STORE = "neossh_events";
let events = {};
try { events = JSON.parse(localStorage.getItem(EVT_STORE)) || {}; } catch (e) { events = {}; }
function saveEvents() { try { localStorage.setItem(EVT_STORE, JSON.stringify(events)); } catch (e) {} }

function renderCalendar(year, month) {
  viewYear = year; viewMonth = month;
  daysEl.innerHTML = "";
  calTitle.innerHTML = `${MONTHS[month]} <span>${year}</span>`;

  const first = new Date(year, month, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();

  const today = new Date();
  const isToday = d => d === today.getDate() && month === today.getMonth() && year === today.getFullYear();

  // leading days from previous month
  for (let i = startDow - 1; i >= 0; i--) addCell(daysInPrev - i, "out");
  // this month
  for (let d = 1; d <= daysInMonth; d++) {
    const cls = "in" + (isToday(d) ? " today" : "");
    addCell(d, cls, `${year}-${month}-${d}`);
  }
  // trailing days to fill 6 rows (42 cells) for stable height
  const total = startDow + daysInMonth;
  const trailing = (7 - (total % 7)) % 7;
  for (let d = 1; d <= trailing; d++) addCell(d, "out");
}

function addCell(num, cls, key) {
  const el = document.createElement("div");
  el.className = "day " + cls;
  el.textContent = num;
  if (key) {
    if (key === selectedKey) el.classList.add("selected");
    if (events[key]) {
      el.title = events[key];
      const dot = document.createElement("span");
      dot.className = "evt-dot";
      el.appendChild(dot);
    }
    el.addEventListener("click", () => {
      selectedKey = key;
      document.querySelectorAll(".day.selected").forEach(d => d.classList.remove("selected"));
      el.classList.add("selected");
      openEvent(key);
    });
  }
  daysEl.appendChild(el);
}

document.getElementById("prev").addEventListener("click", () => {
  let m = viewMonth - 1, y = viewYear;
  if (m < 0) { m = 11; y--; }
  renderCalendar(y, m);
});
document.getElementById("next").addEventListener("click", () => {
  let m = viewMonth + 1, y = viewYear;
  if (m > 11) { m = 0; y++; }
  renderCalendar(y, m);
});
document.getElementById("todayBtn").addEventListener("click", () => {
  const n = new Date(); renderCalendar(n.getFullYear(), n.getMonth());
});

const startNow = new Date();
renderCalendar(startNow.getFullYear(), startNow.getMonth());

/* ---- Event editor modal ----------------------------------- */
const evtModal = document.getElementById("evtModal");
const evtText = document.getElementById("evtText");
const evtDateEl = document.getElementById("evtDate");
let evtKey = null;

function openEvent(key) {
  evtKey = key;
  const [y, m, d] = key.split("-").map(Number);
  const wd = new Date(y, m, d).toLocaleDateString("en-US", { weekday: "long" });
  evtDateEl.textContent = `${wd.toUpperCase()} · ${String(d).padStart(2,"0")} ${MONTHS[m].slice(0,3)} ${y}`;
  evtText.value = events[key] || "";
  evtModal.classList.add("open");
  setTimeout(() => evtText.focus(), 50);
}
function closeEvent() { evtModal.classList.remove("open"); evtKey = null; }

document.getElementById("evtSave").addEventListener("click", () => {
  const v = evtText.value.trim();
  if (v) { events[evtKey] = v; launchFirework(); } else { delete events[evtKey]; }
  saveEvents();
  renderCalendar(viewYear, viewMonth);
  closeEvent();
});
document.getElementById("evtDel").addEventListener("click", () => {
  delete events[evtKey]; saveEvents();
  renderCalendar(viewYear, viewMonth);
  closeEvent();
});
document.getElementById("evtClose").addEventListener("click", closeEvent);
evtModal.addEventListener("click", e => { if (e.target === evtModal) closeEvent(); });
addEventListener("keydown", e => { if (e.key === "Escape") closeEvent(); });

/* ---- Fireworks -------------------------------------------- */
const canvas = document.getElementById("fx");
const ctx = canvas.getContext("2d");
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
addEventListener("resize", resize); resize();

const PALETTE = ["#2ff3ff", "#ff3df0", "#a96bff", "#ffc24b", "#7CFC00", "#ffffff"];
const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

class Particle {
  constructor(x, y, color, speed, angle, life) {
    this.x = x; this.y = y; this.color = color;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = life; this.max = life;
  }
  update() {
    this.vx *= 0.985; this.vy *= 0.985; this.vy += 0.045; // drag + gravity
    this.x += this.vx; this.y += this.vy; this.life--;
  }
  draw() {
    const a = Math.max(this.life / this.max, 0);
    ctx.globalAlpha = a;
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 8; ctx.shadowColor = this.color;
    ctx.beginPath(); ctx.arc(this.x, this.y, 2.1, 0, Math.PI * 2); ctx.fill();
  }
}

let particles = [];
function explode(x, y) {
  const color = PALETTE[(Math.random() * PALETTE.length) | 0];
  const count = 46 + ((Math.random() * 36) | 0);
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + Math.random() * 0.2;
    const speed = 2 + Math.random() * 4.2;
    const life = 50 + ((Math.random() * 40) | 0);
    const c = Math.random() < 0.15 ? "#ffffff" : color;
    particles.push(new Particle(x, y, c, speed, angle, life));
  }
}

class Rocket {
  constructor(targetX, targetY) {
    this.x = targetX; this.y = H + 6;
    this.tx = targetX; this.ty = targetY;
    this.vy = -(7 + Math.random() * 2.5);
    this.color = "#ffffff";
    this.dead = false;
  }
  update() {
    this.y += this.vy; this.vy += 0.06;
    if (this.y <= this.ty || this.vy >= 0) { explode(this.x, this.y); this.dead = true; }
  }
  draw() {
    ctx.globalAlpha = 0.9; ctx.fillStyle = this.color;
    ctx.shadowBlur = 10; ctx.shadowColor = "#ffd27a";
    ctx.fillRect(this.x - 1, this.y, 2, 8);
  }
}

let rockets = [];
function launchFirework(x, y) {
  x = x ?? (W * 0.15 + Math.random() * W * 0.7);
  y = y ?? (H * 0.18 + Math.random() * H * 0.34);
  rockets.push(new Rocket(x, y));
}

let lastAuto = 0;
function loop(t) {
  // Fade existing pixels toward transparent (erase, don't paint) so the
  // background image stays visible while particle trails still fade out.
  ctx.globalCompositeOperation = "destination-out";
  ctx.fillStyle = "rgba(0,0,0,0.18)";
  ctx.fillRect(0, 0, W, H);
  ctx.globalCompositeOperation = "lighter";

  rockets.forEach(r => { r.update(); r.draw(); });
  rockets = rockets.filter(r => !r.dead);

  particles.forEach(p => { p.update(); p.draw(); });
  particles = particles.filter(p => p.life > 0);

  ctx.globalAlpha = 1; ctx.shadowBlur = 0;

  // auto-launch on an interval
  if (!reduceMotion && t - lastAuto > 1500 + Math.random() * 1400) {
    launchFirework();
    if (Math.random() < 0.35) setTimeout(() => launchFirework(), 280);
    lastAuto = t;
  }
  requestAnimationFrame(loop);
}
if (!reduceMotion) {
  requestAnimationFrame(loop);
  // opening burst
  setTimeout(() => { launchFirework(); launchFirework(); }, 400);
}
// (reduced-motion: leave the canvas transparent so the background shows)

/* tap anywhere to launch a firework */
addEventListener("pointerdown", e => {
  if (e.target.closest(".day, button")) return; // those have their own handlers
  launchFirework(e.clientX, e.clientY);
});
</script>
</body>
</html>
